<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Revision">
<meta name="theme-color" content="#f5f5f7">
<title>Carter's GCSE Revision Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f5f7;--surface:#fff;--card:#fff;--accent:#007aff;--accent2:#5856d6;
  --text:#1d1d1f;--text2:#86868b;--text3:#aeaeb2;
  --green:#34c759;--amber:#ff9500;--red:#ff3b30;
  --orange:#ff9500;--yellow:#ffcc00;--lightgreen:#34c759;
  --border:#e5e5ea;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:70px;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.container{max-width:600px;margin:0 auto;padding:16px}

/* Nav */
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;padding:6px 4px 8px;background:none;border:none;color:var(--text3);font-size:10px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:color .2s}
nav button.active{color:var(--accent)}
nav button svg{width:22px;height:22px}

/* Header */
.header{text-align:center;padding:20px 0 8px;position:relative}
.header h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.header p{font-size:12px;color:var(--text2);margin-top:3px;font-weight:400}

/* Tabs content */
.tab{display:none}.tab.active{display:block}

/* Exam countdown cards */
.exam-card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:10px;border-left:4px solid var(--accent);box-shadow:var(--shadow);position:relative;overflow:hidden}
.exam-card .days{position:absolute;right:16px;top:50%;transform:translateY(-50%);text-align:center}
.exam-card .days .num{font-size:30px;font-weight:800;line-height:1;color:var(--text)}
.exam-card .days .label{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.exam-card h3{font-size:14px;font-weight:600;margin-bottom:4px;padding-right:80px;color:var(--text)}
.exam-card .meta{font-size:11px;color:var(--text2)}
.exam-card .meta span{margin-right:10px}
.exam-card.urgent{border-left-color:var(--red)}.exam-card.urgent .days .num{color:var(--red)}
.exam-card.soon{border-left-color:var(--amber)}.exam-card.soon .days .num{color:var(--amber)}
.exam-card.planned{border-left-color:var(--green)}.exam-card.planned .days .num{color:var(--green)}

/* Today's sessions */
.today-box{background:linear-gradient(135deg,#007aff,#5856d6);border-radius:var(--radius);padding:16px;margin-bottom:16px;color:#fff}
.today-box h2{font-size:14px;margin-bottom:10px;font-weight:600;color:#fff}
.session-item{background:rgba(255,255,255,.18);border-radius:10px;padding:12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .2s}
.session-item:active{background:rgba(255,255,255,.28)}
.session-item .info{flex:1}
.session-item .subj{font-size:12px;font-weight:600;color:#fff}
.session-item .topic{font-size:11px;color:rgba(255,255,255,.75)}
.session-item .slot{font-size:10px;color:rgba(255,255,255,.6);font-weight:600}
.session-item.done-session{opacity:.45}
.session-item.done-session .subj,.session-item.done-session .topic{text-decoration:line-through}

/* Progress overview on dashboard */
.progress-overview{margin-bottom:14px;background:var(--surface);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.progress-overview h2{font-size:14px;margin-bottom:8px}
.prog-row{display:flex;align-items:center;margin-bottom:8px;font-size:12px}
.prog-row:last-child{margin-bottom:0}
.prog-row .plabel{width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;color:var(--text)}
.prog-row .pbar{flex:1;height:6px;background:var(--bg);border-radius:3px;margin:0 10px;overflow:hidden}
.prog-row .pfill{height:100%;border-radius:3px;transition:width .4s}
.prog-row .ppct{width:36px;text-align:right;font-weight:600;font-size:11px}

/* Timetable */
.week-header{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow);transition:background .15s}
.week-header:active{background:#f0f0f5}
.week-header h3{font-size:13px;font-weight:600;color:var(--text)}.week-header .arrow{transition:transform .3s;font-size:12px;color:var(--text2)}
.week-header.open .arrow{transform:rotate(180deg)}
.week-header.current-week{border:2px solid var(--accent)}
.week-body{display:none;margin-bottom:12px}
.week-body.open{display:block}
.day-col{margin-bottom:10px}
.day-col h4{font-size:11px;color:var(--accent);margin-bottom:4px;padding-left:4px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.tt-session{background:var(--surface);border-radius:10px;padding:10px 12px;margin-bottom:4px;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:var(--shadow);transition:background .15s}
.tt-session:active{background:#f0f0f5}
.tt-session .check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;transition:.2s}
.tt-session.completed .check{background:var(--green);border-color:var(--green);color:#fff}
.tt-session .sinfo{flex:1}
.tt-session .ssubj{font-size:12px;font-weight:600}
.tt-session .stopic{font-size:11px;color:var(--text2)}
.tt-session .sslot{font-size:10px;color:var(--text3);font-weight:500}

/* Progress tracker */
.subject-section{margin-bottom:10px}
.subject-header{background:var(--surface);border-radius:var(--radius);padding:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow);transition:background .15s}
.subject-header:active{background:#f0f0f5}
.subject-header h3{font-size:14px;flex:1;font-weight:600}
.subject-header .pct-badge{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;margin-right:8px}
.subject-header .arrow{transition:transform .3s;font-size:12px;color:var(--text2)}
.subject-header.open .arrow{transform:rotate(180deg)}
.subject-body{display:none;padding:8px 0}
.subject-body.open{display:block}
.subject-pbar{height:4px;background:var(--bg);border-radius:2px;margin:0 4px 10px;overflow:hidden}
.subject-pfill{height:100%;border-radius:2px;transition:width .4s}
.topic-row{background:var(--surface);border-radius:10px;padding:12px 14px;margin-bottom:6px;box-shadow:var(--shadow)}
.topic-top{display:flex;align-items:center;gap:10px}
.topic-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;font-size:13px;transition:.2s}
.topic-check:active{transform:scale(.9)}
.topic-check.checked{background:var(--green);border-color:var(--green);color:#fff}
.topic-name{font-size:13px;font-weight:500;flex:1;color:var(--text)}
.topic-detail{font-size:11px;color:var(--text2);margin-top:4px;padding-left:32px}
.confidence-row{display:flex;gap:5px;margin-top:8px;padding-left:32px}
.conf-btn{width:30px;height:30px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:.15s}
.conf-btn:active{transform:scale(.9)}
.conf-btn.c1{background:#ffe5e5;color:#ff3b30}.conf-btn.c2{background:#fff3e0;color:#ff9500}.conf-btn.c3{background:#fff9e0;color:#a68a00}.conf-btn.c4{background:#e5f9ed;color:#248a3d}.conf-btn.c5{background:#d1f5dc;color:#1b7d32}
.conf-btn.selected.c1{background:#ff3b30;color:#fff}.conf-btn.selected.c2{background:#ff9500;color:#fff}.conf-btn.selected.c3{background:#ffcc00;color:#1d1d1f}.conf-btn.selected.c4{background:#34c759;color:#fff}.conf-btn.selected.c5{background:#248a3d;color:#fff}
.conf-btn.selected{transform:scale(1.15);box-shadow:0 2px 8px rgba(0,0,0,.15)}

/* Weak areas */
.weak-card{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:8px;border-left:4px solid var(--orange);box-shadow:var(--shadow)}
.weak-card h4{font-size:13px;margin-bottom:3px;font-weight:600;color:var(--text)}
.weak-card .wsubj{font-size:11px;color:var(--accent);margin-bottom:4px}
.weak-card .wreason{font-size:11px;color:var(--text2);margin-bottom:5px;font-style:italic}
.weak-card .waction{font-size:12px;margin-bottom:8px;color:var(--text);line-height:1.4}
.weak-card .wbottom{display:flex;align-items:center;gap:10px}
.weak-done{display:flex;align-items:center;gap:5px;font-size:11px;cursor:pointer;font-weight:500;color:var(--text2)}
.weak-done .wcheck{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;transition:.2s}
.weak-done .wcheck.checked{background:var(--green);border-color:var(--green);color:#fff}
.weak-conf{display:flex;gap:4px}
.weak-conf .wc{width:24px;height:24px;border-radius:6px;border:none;font-size:10px;font-weight:700;cursor:pointer;transition:.15s}
.weak-conf .wc.c1{background:#ffe5e5;color:#ff3b30}.weak-conf .wc.c2{background:#fff3e0;color:#ff9500}.weak-conf .wc.c3{background:#fff9e0;color:#a68a00}.weak-conf .wc.c4{background:#e5f9ed;color:#248a3d}.weak-conf .wc.c5{background:#d1f5dc;color:#1b7d32}
.weak-conf .wc.selected.c1{background:#ff3b30;color:#fff}.weak-conf .wc.selected.c2{background:#ff9500;color:#fff}.weak-conf .wc.selected.c3{background:#ffcc00;color:#1d1d1f}.weak-conf .wc.selected.c4{background:#34c759;color:#fff}.weak-conf .wc.selected.c5{background:#248a3d;color:#fff}
.weak-conf .wc.selected{transform:scale(1.1);box-shadow:0 2px 6px rgba(0,0,0,.12)}

/* Tips */
.tip-card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.tip-card h3{font-size:14px;margin-bottom:2px;font-weight:600}
.tip-card .texam{font-size:11px;color:var(--accent);margin-bottom:10px;font-weight:500}
.tip-card ul{font-size:12px;padding-left:18px;margin-bottom:10px}
.tip-card ul li{margin-bottom:5px;color:var(--text2);line-height:1.4}
.tip-links{display:flex;gap:8px;flex-wrap:wrap}
.tip-links a{background:var(--accent);color:#fff;text-decoration:none;padding:7px 14px;border-radius:20px;font-size:11px;font-weight:600;transition:opacity .2s}
.tip-links a:hover{opacity:.85}

/* Universal resources */
.res-card{background:var(--surface);border-radius:var(--radius);padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow)}
.res-card .rname{font-size:13px;font-weight:600;color:var(--text)}
.res-card .rdesc{font-size:11px;color:var(--text2)}
.res-card a{background:var(--accent);color:#fff;text-decoration:none;padding:7px 14px;border-radius:20px;font-size:11px;font-weight:600}

/* Utilities */
.section-title{font-size:15px;font-weight:700;margin:20px 0 10px;letter-spacing:-.2px}
.empty-state{text-align:center;padding:30px;color:var(--text2);font-size:13px}
.backup-btns{display:flex;gap:8px;margin:16px 0}
.backup-btns button{flex:1;padding:12px;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s}
.backup-btns button:active{opacity:.7}
.btn-export{background:var(--accent);color:#fff}
.btn-import{background:var(--bg);color:var(--text);border:1px solid var(--border) !important}
.btn-reset{background:var(--red);color:#fff;margin-top:8px;width:100%;padding:12px;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer}
</style>
</head>

</div>

</nav>

  {s:"Science: Chemistry 1",exam:"12 Jun 2026",tips:["Balancing equations is worth LOTS of marks - practise every single day","Know state symbols - (s)(l)(g)(aq) - appear on every paper","Moles: n = m/Mr - this formula gets you through most calculation questions","Use BBC Bitesize WJEC Chemistry for spec-specific questions on each topic"],flashcards:"https://www.brainscape.com/subjects/gcse-wjec",papers:"https://revisionscience.com/gcse-revision/science/science-gcse-past-papers/wjec-gcse-science-past-papers"},
  {s:"Science: Physics 1",exam:"15 Jun 2026",tips:["Equation sheet IS provided - but you still need to know how to use and rearrange each one","ALWAYS write equation, rearrange, substitute, solve with units - method marks throughout","Draw diagrams for circuit questions - it helps you apply the right rules","Past paper examiner reports show velocity-time graphs and equation rearrangement are commonly poor - practise these most"],flashcards:"https://quizlet.com/gb/subject/gcse-physics/",papers:"https://revisionscience.com/gcse-revision/science/science-gcse-past-papers/wjec-gcse-science-past-papers"}
];

const UNIVERSAL_RES = [
  {name:"revise.wales",desc:"300+ WJEC past papers - every subject, all in one place",url:"https://revise.wales/"},
  {name:"WJEC Question Bank",desc:"Build custom practice papers by topic from real past paper Qs",url:"https://questionbank.wjec.co.uk/students/past-papers/"},
  {name:"BBC Bitesize WJEC",desc:"WJEC-specific notes, videos & quizzes - select your subject",url:"https://www.bbc.co.uk/bitesize/secondary"},
  {name:"Medly",desc:"AI revision tutor - use daily for flashcards & explanations",url:"https://medly.ai"},
  {name:"Save My Exams WJEC",desc:"Past papers + mark schemes organised by subject and year",url:"https://www.savemyexams.com/past-papers/wjec/"}
];

// ===== STATE =====
const STORAGE_KEY = "carter-revision-v1";
let state = loadState();

function defaultState(){
  return {topicDone:{},topicConf:{},sessionDone:{},weakDone:{},weakConf:{}};
}
function loadState(){
  try{const d=localStorage.getItem(STORAGE_KEY);return d?{...defaultState(),...JSON.parse(d)}:defaultState();}catch(e){return defaultState();}
}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function topicKey(s,n){return s+"::"+n;}
function sessionKey(wi,day,slot){return wi+"::"+day+"::"+slot;}
function weakKey(s,area){return s+"::"+area;}

// ===== HELPERS =====
function daysUntil(dateStr){
  const now=new Date();now.setHours(0,0,0,0);
  const exam=new Date(dateStr);exam.setHours(0,0,0,0);
  return Math.ceil((exam-now)/(86400000));
}
function todayDayName(){return["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date().getDay()];}
function getCurrentWeekIndex(){
  const now=new Date();now.setHours(0,0,0,0);
  for(let i=TIMETABLE.length-1;i>=0;i--){
    const ws=new Date(TIMETABLE[i].weekStart);ws.setHours(0,0,0,0);
    if(now>=ws)return i;
  }
  return 0;
}
function getSubjectTopics(subj){return TOPICS.filter(t=>t.s===subj);}
function getSubjectProgress(subj){
  const topics=getSubjectTopics(subj);
  if(!topics.length)return{done:0,total:0,pct:0};
  const done=topics.filter(t=>state.topicDone[topicKey(t.s,t.n)]).length;
  return{done,total:topics.length,pct:Math.round(done/topics.length*100)};
}
function confColor(c){return["","#ff1744","#ff6d00","#ffd600","#69f0ae","#00c853"][c]||"#555";}

// ===== EVENT DELEGATION =====
document.addEventListener("click",function(e){
  const el=e.target.closest("[data-action]");
  if(!el)return;
  const action=el.dataset.action;
  const wi=parseInt(el.dataset.wi)||0;
  const day=el.dataset.day||"";
  const slot=parseInt(el.dataset.slot)||0;
  const ti=parseInt(el.dataset.ti);
  const ci=parseInt(el.dataset.ci)||0;

  if(action==="toggle-session"){
    const sk=sessionKey(wi,day,slot);
    state.sessionDone[sk]=!state.sessionDone[sk];
    saveState();renderDashboard();
  } else if(action==="toggle-week"){
    document.getElementById("wh-"+wi).classList.toggle("open");
    document.getElementById("wb-"+wi).classList.toggle("open");
  } else if(action==="toggle-tt"){
    const sk=sessionKey(wi,day,slot);
    state.sessionDone[sk]=!state.sessionDone[sk];
    saveState();renderTimetable();renderDashboard();
  } else if(action==="toggle-subj"){
    const sid=el.dataset.sid;
    document.getElementById("sh-"+sid).classList.toggle("open");
    document.getElementById("sb-"+sid).classList.toggle("open");
  } else if(action==="toggle-topic"){
    const tp=TOPICS[ti];
    const tk=topicKey(tp.s,tp.n);
    state.topicDone[tk]=!state.topicDone[tk];
    saveState();renderProgress();renderDashboard();
  } else if(action==="set-conf"){
    const tp=TOPICS[ti];
    const tk=topicKey(tp.s,tp.n);
    state.topicConf[tk]=state.topicConf[tk]===ci?0:ci;
    saveState();renderProgress();
  } else if(action==="toggle-weak"){
    const w=WEAK_AREAS[ti];
    const wk=weakKey(w.s,w.area);
    state.weakDone[wk]=!state.weakDone[wk];
    saveState();renderWeak();
  } else if(action==="set-weak-conf"){
    const w=WEAK_AREAS[ti];
    const wk=weakKey(w.s,w.area);
    state.weakConf[wk]=state.weakConf[wk]===ci?0:ci;
    saveState();renderWeak();
  }
});

// ===== RENDER DASHBOARD =====
function renderDashboard(){
  let html="";
  EXAMS.forEach(e=>{
    const d=daysUntil(e.date);
    const cls=d<=7?"urgent":d<=21?"soon":"planned";
    html+=`<div class="exam-card ${cls}">
      <h3>${e.subject}</h3>
      <div class="meta"><span>${e.day} ${e.date.slice(5).replace("-"," ")}</span><span>${e.duration}</span><span>Seat ${e.seat}</span></div>
      <div class="days"><div class="num">${d}</div><div class="label">days</div></div>
    </div>`;
  });
  document.getElementById("exam-cards").innerHTML=html;

  const dayName=todayDayName();
  const wi=getCurrentWeekIndex();
  const week=TIMETABLE[wi];
  const todaySessions=week?week.sessions.filter(s=>s.day===dayName):[];
  if(todaySessions.length){
    let sh=`<div class="today-box"><h2>${dayName} &middot; Week of ${week.week}</h2>`;
    todaySessions.forEach(s=>{
      const sk=sessionKey(wi,s.day,s.slot);
      const done=state.sessionDone[sk];
      sh+=`<div class="session-item ${done?"done-session":""}" data-action="toggle-session" data-wi="${wi}" data-day="${s.day}" data-slot="${s.slot}">
        <div class="info"><div class="subj" style="color:${SUBJECT_COLORS[s.s]||"#fff"}">${s.s}</div><div class="topic">${s.t}</div></div>
        <div class="slot">Session ${s.slot}</div>
      </div>`;
    });
    sh+=`</div>`;
    document.getElementById("today-sessions").innerHTML=sh;
  } else {
    document.getElementById("today-sessions").innerHTML=`<div class="empty-state">No sessions scheduled for today</div>`;
  }

  let ph="";
  SUBJECTS.forEach(subj=>{
    const p=getSubjectProgress(subj);
    const col=SUBJECT_COLORS[subj]||"#4fc3f7";
    ph+=`<div class="prog-row">
      <div class="plabel">${subj}</div>
      <div class="pbar"><div class="pfill" style="width:${p.pct}%;background:${col}"></div></div>
      <div class="ppct" style="color:${col}">${p.pct}%</div>
    </div>`;
  });
  document.getElementById("dash-progress").innerHTML=ph;
}

// ===== RENDER TIMETABLE =====
function renderTimetable(){
  const cwi=getCurrentWeekIndex();
  const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  let html="";
  TIMETABLE.forEach((w,wi)=>{
    const isCurrent=wi===cwi;
    html+=`<div class="week-header ${isCurrent?"current-week":""}" data-action="toggle-week" data-wi="${wi}" id="wh-${wi}">
      <h3>Week of ${w.week} &middot; ${w.nextExam}</h3>
      <span class="arrow">\u25BC</span>
    </div>
    <div class="week-body" id="wb-${wi}">`;
    days.forEach(day=>{
      const daySessions=w.sessions.filter(s=>s.day===day);
      if(!daySessions.length)return;
      html+=`<div class="day-col"><h4>${day}</h4>`;
      daySessions.forEach(s=>{
        const sk=sessionKey(wi,s.day,s.slot);
        const done=state.sessionDone[sk];
        html+=`<div class="tt-session ${done?"completed":""}" data-action="toggle-tt" data-wi="${wi}" data-day="${s.day}" data-slot="${s.slot}">
          <div class="check">${done?"\u2713":""}</div>
          <div class="sinfo">
            <div class="ssubj" style="color:${SUBJECT_COLORS[s.s]||"#fff"}">${s.s}</div>
            <div class="stopic">${s.t}</div>
          </div>
          <div class="sslot">S${s.slot}</div>
        </div>`;
      });
      html+=`</div>`;
    });
    html+=`</div>`;
  });
  document.getElementById("timetable-content").innerHTML=html;
  const wh=document.getElementById("wh-"+cwi);
  const wb=document.getElementById("wb-"+cwi);
  if(wh&&wb){wh.classList.add("open");wb.classList.add("open");}
}

// ===== RENDER PROGRESS =====
function renderProgress(){
  // Remember which subjects are currently expanded
  const openSids=new Set();
  document.querySelectorAll(".subject-header.open").forEach(el=>openSids.add(el.dataset.sid));

  let html="";
  SUBJECTS.forEach((subj,si)=>{
    const topics=getSubjectTopics(subj);
    const p=getSubjectProgress(subj);
    const col=SUBJECT_COLORS[subj]||"#4fc3f7";
    const sid=subj.replace(/[^a-zA-Z0-9]/g,"");
    const isOpen=openSids.has(sid);
    html+=`<div class="subject-section">
      <div class="subject-header ${isOpen?"open":""}" data-action="toggle-subj" data-sid="${sid}" id="sh-${sid}">
        <h3 style="color:${col}">${subj}</h3>
        <span class="pct-badge" style="background:${col};color:#000">${p.done}/${p.total} &middot; ${p.pct}%</span>
        <span class="arrow">\u25BC</span>
      </div>
      <div class="subject-body ${isOpen?"open":""}" id="sb-${sid}">
        <div class="subject-pbar"><div class="subject-pfill" style="width:${p.pct}%;background:${col}"></div></div>`;
    topics.forEach(tp=>{
      const ti=TOPICS.indexOf(tp);
      const tk=topicKey(tp.s,tp.n);
      const done=state.topicDone[tk];
      const conf=state.topicConf[tk]||0;
      html+=`<div class="topic-row">
        <div class="topic-top">
          <div class="topic-check ${done?"checked":""}" data-action="toggle-topic" data-ti="${ti}">${done?"\u2713":""}</div>
          <div class="topic-name">${tp.n}. ${tp.t}</div>
        </div>
        <div class="topic-detail">${tp.d}</div>
        <div class="confidence-row">`;
      for(let c=1;c<=5;c++){
        html+=`<button class="conf-btn c${c} ${conf===c?"selected":""}" data-action="set-conf" data-ti="${ti}" data-ci="${c}">${c}</button>`;
      }
      html+=`</div></div>`;
    });
    html+=`</div></div>`;
  });
  document.getElementById("progress-content").innerHTML=html;
}

// ===== RENDER WEAK AREAS =====
function renderWeak(){
  let html="";
  let currentSubj="";
  WEAK_AREAS.forEach((w,i)=>{
    if(w.s!==currentSubj){
      currentSubj=w.s;
      html+=`<div class="section-title" style="color:${SUBJECT_COLORS[w.s]||"#fff"};font-size:13px;margin-top:14px">${w.s}</div>`;
    }
    const wk=weakKey(w.s,w.area);
    const done=state.weakDone[wk];
    const conf=state.weakConf[wk]||0;
    html+=`<div class="weak-card">
      <h4>${w.area}</h4>
      <div class="wreason">${w.reason}</div>
      <div class="waction">${w.action}</div>
      <div class="wbottom">
        <div class="weak-done" data-action="toggle-weak" data-ti="${i}">
          <div class="wcheck ${done?"checked":""}">${done?"\u2713":""}</div>
          <span>Done</span>
        </div>
        <div class="weak-conf">`;
    for(let c=1;c<=5;c++){
      html+=`<button class="wc c${c} ${conf===c?"selected":""}" data-action="set-weak-conf" data-ti="${i}" data-ci="${c}">${c}</button>`;
    }
    html+=`</div></div></div>`;
  });
  document.getElementById("weak-content").innerHTML=html;
}

// ===== RENDER TIPS =====
function renderTips(){
  let html="";
  EXAM_TIPS.forEach(et=>{
    html+=`<div class="tip-card">
      <h3 style="color:${SUBJECT_COLORS[et.s]||"#fff"}">${et.s}</h3>
      <div class="texam">Exam: ${et.exam}</div>
      <ul>${et.tips.map(t=>`<li>${t}</li>`).join("")}</ul>
      <div class="tip-links">
        <a href="${et.flashcards}" target="_blank" rel="noopener">Flashcards</a>
        <a href="${et.papers}" target="_blank" rel="noopener">Past Papers</a>
      </div>
    </div>`;
  });
  document.getElementById("tips-content").innerHTML=html;

  let rh="";
  UNIVERSAL_RES.forEach(r=>{
    rh+=`<div class="res-card">
      <div><div class="rname">${r.name}</div><div class="rdesc">${r.desc}</div></div>
      <a href="${r.url}" target="_blank" rel="noopener">Open</a>
    </div>`;
  });
  document.getElementById("universal-res").innerHTML=rh;
}

// ===== BACKUP =====
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="revision-progress-backup.json";
  a.click();
}
function importData(){document.getElementById("import-file").click();}
document.getElementById("import-file").addEventListener("change",function(e){
  const f=e.target.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{state={...defaultState(),...JSON.parse(ev.target.result)};saveState();renderAll();alert("Progress imported!");}
    catch(err){alert("Invalid file");}
  };
  reader.readAsText(f);
});
function resetData(){
  if(confirm("Reset ALL progress? This cannot be undone.")){
    state=defaultState();saveState();renderAll();
  }
}

// ===== NAV =====
document.querySelectorAll("nav button").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("tab-"+btn.dataset.tab).classList.add("active");
    window.scrollTo(0,0);
  });
});

// ===== INIT =====
function renderAll(){renderDashboard();renderTimetable();renderProgress();renderWeak();renderTips();}
renderAll();
</script>
